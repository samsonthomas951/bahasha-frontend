<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Bahasha - Sign Up</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1193d4",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101c22",
                        "text-light": "#0d171b",
                        "text-dark": "#e7eff3",
                        "subtle-light": "#4c809a",
                        "subtle-dark": "#a0b3bd",
                        "input-light": "#e7eff3",
                        "input-dark": "#1a2c36"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .form-input::placeholder {
            color: #a0b3bd;
        }
        .dark .form-input::placeholder {
            color: #4c809a;
        }
        .error-message {
            display: none;
        }
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
    <div class="flex flex-col min-h-screen">
        <header class="w-full">
            <div class="container mx-auto px-6 py-4 flex items-center gap-3">
                <div class="w-8 h-8 text-primary">
                    <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <g clip-path="url(#clip0_6_330)">
                            <path clip-rule="evenodd" d="M24 0.757355L47.2426 24L24 47.2426L0.757355 24L24 0.757355ZM21 35.7574V12.2426L9.24264 24L21 35.7574Z" fill="currentColor" fill-rule="evenodd"></path>
                        </g>
                        <defs>
                            <clipPath id="clip0_6_330">
                                <rect fill="white" height="48" width="48"></rect>
                            </clipPath>
                        </defs>
                    </svg>
                </div>
                <h1 class="text-xl font-bold text-text-light dark:text-text-dark">Bahasha</h1>
            </div>
        </header>
        
        <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
            <div class="w-full max-w-md space-y-8">
                <div>
                    <h2 class="mt-6 text-center text-3xl font-bold tracking-tight text-text-light dark:text-text-dark">
                        Create your account
                    </h2>
                    <p class="mt-2 text-center text-sm text-subtle-light dark:text-subtle-dark">
                        Join Bahasha to simplify your contributions.
                    </p>
                </div>
                
                <!-- Error message -->
                <div id="error-message" class="error-message bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 px-4 py-3 rounded-lg text-sm"></div>
                
                <!-- Success message -->
                <div id="success-message" class="error-message bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 text-green-600 dark:text-green-400 px-4 py-3 rounded-lg text-sm"></div>
                
                <form id="signup-form" class="mt-8 space-y-6">
                    <div class="rounded-lg shadow-sm -space-y-px">
                        <div>
                            <label class="sr-only" for="username">Username</label>
                            <input 
                                class="form-input appearance-none rounded-none relative block w-full px-3 py-3 bg-input-light dark:bg-input-dark border-0 text-text-light dark:text-text-dark placeholder-subtle-light dark:placeholder-subtle-dark focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary focus:z-10 sm:text-sm rounded-t-lg" 
                                id="username" 
                                name="username" 
                                placeholder="Username (for login)" 
                                required 
                                type="text"
                                minlength="3"
                            />
                        </div>
                        <div>
                            <label class="sr-only" for="email-address">Email address</label>
                            <input 
                                autocomplete="email" 
                                class="form-input appearance-none rounded-none relative block w-full px-3 py-3 bg-input-light dark:bg-input-dark border-0 text-text-light dark:text-text-dark placeholder-subtle-light dark:placeholder-subtle-dark focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary focus:z-10 sm:text-sm" 
                                id="email-address" 
                                name="email" 
                                placeholder="Email address" 
                                required 
                                type="email"
                            />
                        </div>
                        <div>
                            <label class="sr-only" for="phone-number">Phone number</label>
                            <input 
                                class="form-input appearance-none rounded-none relative block w-full px-3 py-3 bg-input-light dark:bg-input-dark border-0 text-text-light dark:text-text-dark placeholder-subtle-light dark:placeholder-subtle-dark focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary focus:z-10 sm:text-sm" 
                                id="phone-number" 
                                name="phone-number" 
                                placeholder="Phone number (e.g., +254712345678)" 
                                type="tel"
                                pattern="^(\+254|0)[7][0-9]{8}$"
                            />
                        </div>
                        <div>
                            <label class="sr-only" for="password">Password</label>
                            <input 
                                class="form-input appearance-none rounded-none relative block w-full px-3 py-3 bg-input-light dark:bg-input-dark border-0 text-text-light dark:text-text-dark placeholder-subtle-light dark:placeholder-subtle-dark focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary focus:z-10 sm:text-sm" 
                                id="password" 
                                name="password" 
                                placeholder="Password (min 6 characters)" 
                                required 
                                type="password"
                                minlength="6"
                            />
                        </div>
                        <div>
                            <label class="sr-only" for="confirm-password">Confirm Password</label>
                            <input 
                                class="form-input appearance-none rounded-none relative block w-full px-3 py-3 bg-input-light dark:bg-input-dark border-0 text-text-light dark:text-text-dark placeholder-subtle-light dark:placeholder-subtle-dark focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary focus:z-10 sm:text-sm rounded-b-lg" 
                                id="confirm-password" 
                                name="confirm-password" 
                                placeholder="Confirm password" 
                                required 
                                type="password"
                                minlength="6"
                            />
                        </div>
                    </div>
                    
                    <div>
                        <button 
                            id="signup-button"
                            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" 
                            type="submit"
                        >
                            <span id="button-text">Sign up</span>
                            <span id="button-loader" class="hidden">
                                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                            </span>
                        </button>
                    </div>
                </form>
                
                <div class="text-sm text-center">
                    <a class="font-medium text-primary hover:text-primary/80" href="login.html">
                        Already have an account? Sign in
                    </a>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = 'http://localhost:5000/api/v1'; // Update this with your backend URL
        
        // DOM elements
        const signupForm = document.getElementById('signup-form');
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');
        const signupButton = document.getElementById('signup-button');
        const buttonText = document.getElementById('button-text');
        const buttonLoader = document.getElementById('button-loader');
        
        // Handle signup form submission
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear messages
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
            
            // Get form data
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email-address').value.trim();
            const phone_number = document.getElementById('phone-number').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            // Validate passwords match
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match!';
                errorMessage.classList.add('show');
                return;
            }
            
            // Show loading state
            signupButton.disabled = true;
            buttonText.classList.add('hidden');
            buttonLoader.classList.remove('hidden');
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        phone_number: phone_number || null,
                        password
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Save auth data
                    localStorage.setItem('authToken', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    localStorage.setItem('tokenExpiry', data.data.expires_at);
                    
                    // Show success message
                    successMessage.textContent = 'Account created successfully! Redirecting...';
                    successMessage.classList.add('show');
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    // Show error message
                    if (data.errors && Array.isArray(data.errors)) {
                        errorMessage.textContent = data.errors.join('. ');
                    } else {
                        errorMessage.textContent = data.message || 'Registration failed. Please try again.';
                    }
                    errorMessage.classList.add('show');
                }
            } catch (error) {
                console.error('Signup error:', error);
                errorMessage.textContent = 'Network error. Please check your connection and try again.';
                errorMessage.classList.add('show');
            } finally {
                // Reset button state
                signupButton.disabled = false;
                buttonText.classList.remove('hidden');
                buttonLoader.classList.add('hidden');
            }
        });
        
        // Check if already logged in
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('authToken');
            if (token) {
                try {
                    const response = await fetch(`${API_BASE_URL}/auth/verify`, {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                        }
                    });
                    
                    const data = await response.json();
                    if (data.valid) {
                        // Already logged in, redirect to dashboard
                        window.location.href = 'dashboard.html';
                    }
                } catch (error) {
                    console.error('Verification error:', error);
                }
            }
        });
    </script>
</body>
</html>
