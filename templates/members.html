<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .modal-backdrop {
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-50">
        <!-- Header -->
        <div class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center py-4">
                    <div class="flex items-center">
                        <svg class="h-8 w-8 text-blue-600 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                        <h1 class="text-2xl font-bold text-gray-900">Groups Management</h1>
                    </div>
                    <div class="flex items-center space-x-4">
                        <button onclick="syncGroups()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                            <svg class="h-4 w-4 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                            </svg>
                            Sync Groups
                        </button>
                        <button onclick="openCreateGroupModal()" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">
                            <svg class="h-4 w-4 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                            Create Group
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Statistics Cards -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-blue-100 rounded-lg p-3">
                            <svg class="h-6 w-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                            </svg>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm font-medium text-gray-600">Total Groups</p>
                            <p class="text-2xl font-semibold text-gray-900" id="totalGroups">0</p>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-green-100 rounded-lg p-3">
                            <svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                            </svg>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm font-medium text-gray-600">Total Members</p>
                            <p class="text-2xl font-semibold text-gray-900" id="totalMembers">0</p>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-purple-100 rounded-lg p-3">
                            <svg class="h-6 w-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                            </svg>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm font-medium text-gray-600">Active Groups</p>
                            <p class="text-2xl font-semibold text-gray-900" id="activeGroups">0</p>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-yellow-100 rounded-lg p-3">
                            <svg class="h-6 w-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm font-medium text-gray-600">Total Donations</p>
                            <p class="text-2xl font-semibold text-gray-900">$<span id="totalDonations">0</span></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Groups Grid -->
            <div id="groupsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Groups will be loaded here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden text-center py-12">
                <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                <h3 class="mt-2 text-sm font-medium text-gray-900">No groups</h3>
                <p class="mt-1 text-sm text-gray-500">Get started by creating a new group.</p>
                <div class="mt-6">
                    <button onclick="openCreateGroupModal()" class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700">
                        <svg class="h-4 w-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Create Group
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Create/Edit Group Modal -->
    <div id="groupModal" class="hidden fixed inset-0 z-50 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4">
            <div class="modal-backdrop fixed inset-0 bg-gray-500 bg-opacity-75" onclick="closeGroupModal()"></div>
            <div class="bg-white rounded-lg max-w-md w-full p-6 relative z-10">
                <h3 class="text-lg font-medium text-gray-900 mb-4" id="modalTitle">Create New Group</h3>
                <form id="groupForm" onsubmit="handleGroupSubmit(event)">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Group Code</label>
                            <input type="text" id="groupCode" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="e.g., AMS, AMO">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Group Name</label>
                            <input type="text" id="groupName" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Enter group name">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                            <textarea id="groupDescription" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Enter group description"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Color</label>
                            <div class="flex items-center space-x-2">
                                <input type="color" id="groupColor" value="#3B82F6" class="h-10 w-20 border border-gray-300 rounded cursor-pointer">
                                <input type="text" id="groupColorText" value="#3B82F6" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg" readonly>
                            </div>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end space-x-3">
                        <button type="button" onclick="closeGroupModal()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                            Cancel
                        </button>
                        <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">
                            <span id="submitButtonText">Create Group</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Members Modal -->
    <div id="membersModal" class="hidden fixed inset-0 z-50 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4">
            <div class="modal-backdrop fixed inset-0 bg-gray-500 bg-opacity-75" onclick="closeMembersModal()"></div>
            <div class="bg-white rounded-lg max-w-4xl w-full max-h-[80vh] overflow-hidden relative z-10">
                <div class="px-6 py-4 border-b border-gray-200">
                    <div class="flex items-center justify-between">
                        <h3 class="text-lg font-medium text-gray-900" id="membersModalTitle">Group Members</h3>
                        <button onclick="closeMembersModal()" class="text-gray-400 hover:text-gray-500">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="px-6 py-4 border-b border-gray-200">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-4">
                            <button onclick="showAddMemberForm()" class="px-3 py-1.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">
                                Add Member
                            </button>
                            <button onclick="showBulkAddForm()" class="px-3 py-1.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                                Bulk Add
                            </button>
                        </div>
                        <div class="relative">
                            <input type="text" id="memberSearch" placeholder="Search members..." class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <svg class="absolute left-3 top-2.5 h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                        </div>
                    </div>
                </div>
                
                <!-- Add Member Form (Hidden by default) -->
                <div id="addMemberForm" class="hidden px-6 py-4 bg-blue-50 border-b border-blue-200">
                    <div class="flex items-end space-x-3">
                        <div class="flex-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                            <input type="tel" id="newMemberPhone" placeholder="+254..." class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                        </div>
                        <div class="flex-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                            <input type="text" id="newMemberName" placeholder="Member name" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                        </div>
                        <button onclick="addMemberToGroup()" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">
                            Add
                        </button>
                        <button onclick="hideAddMemberForm()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                            Cancel
                        </button>
                    </div>
                </div>

                <!-- Bulk Add Form (Hidden by default) -->
                <div id="bulkAddForm" class="hidden px-6 py-4 bg-green-50 border-b border-green-200">
                    <div class="space-y-3">
                        <label class="block text-sm font-medium text-gray-700">Add Multiple Members (Phone, Name - one per line)</label>
                        <textarea id="bulkMembersData" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-lg" placeholder="+254712345678, John Doe&#10;+254712345679, Jane Smith"></textarea>
                        <div class="flex space-x-3">
                            <button onclick="bulkAddMembers()" class="px-4 py-2 text-sm font-medium text-white bg-green-600 rounded-lg hover:bg-green-700">
                                Add All
                            </button>
                            <button onclick="hideBulkAddForm()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>

                <div class="overflow-y-auto max-h-[50vh]">
                    <table class="min-w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Phone</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Donations</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Total</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="membersTableBody" class="bg-white divide-y divide-gray-200">
                            <!-- Members will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-gray-500 bg-opacity-75">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-white"></div>
    </div>

    <!-- Notification Container -->
    <div id="notificationContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <script>
        // Configuration
        const API_BASE_URL = 'http://localhost:5000/api/v1';
        
        // State
        let groups = [];
        let currentGroup = null;
        let currentGroupMembers = [];
        let editingGroupId = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', async function() {
            const isAuthenticated = await checkAuth();
            if (!isAuthenticated) return;
            
            await loadGroups();
            await loadStatistics();
            
            // Color picker sync
            document.getElementById('groupColor').addEventListener('input', function(e) {
                document.getElementById('groupColorText').value = e.target.value;
            });
            
            // Member search
            document.getElementById('memberSearch').addEventListener('input', function(e) {
                filterMembers(e.target.value);
            });
        });

        // Authentication
        async function checkAuth() {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = 'login.html';
                return false;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/verify`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    }
                });
                
                const data = await response.json();
                if (!data.valid) {
                    localStorage.clear();
                    window.location.href = 'login.html';
                    return false;
                }
                return true;
            } catch (error) {
                console.error('Auth check error:', error);
                window.location.href = 'login.html';
                return false;
            }
        }

        // Load groups
        async function loadGroups() {
            showLoading();
            try {
                const token = localStorage.getItem('authToken');
                const response = await fetch(`${API_BASE_URL}/groups/list`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                if (data.success) {
                    groups = data.groups;
                    renderGroups();
                } else {
                    showNotification('error', 'Failed to load groups');
                }
            } catch (error) {
                console.error('Error loading groups:', error);
                showNotification('error', 'Error loading groups');
            } finally {
                hideLoading();
            }
        }

        // Load statistics
        async function loadStatistics() {
            try {
                const token = localStorage.getItem('authToken');
                const response = await fetch(`${API_BASE_URL}/groups/statistics`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                if (data.success) {
                    document.getElementById('totalGroups').textContent = data.summary.total_groups;
                    document.getElementById('totalMembers').textContent = data.summary.total_members;
                    document.getElementById('activeGroups').textContent = data.statistics.filter(s => s.group.is_active).length;
                    document.getElementById('totalDonations').textContent = data.summary.total_donations.toFixed(2);
                }
            } catch (error) {
                console.error('Error loading statistics:', error);
            }
        }

        // Render groups
        function renderGroups() {
            const container = document.getElementById('groupsContainer');
            const emptyState = document.getElementById('emptyState');
            
            if (groups.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            container.innerHTML = groups.map(group => `
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow">
                    <div class="p-6">
                        <div class="flex items-start justify-between mb-4">
                            <div class="flex items-center">
                                <div class="h-12 w-12 rounded-lg flex items-center justify-center" style="background-color: ${group.color}20;">
                                    <span class="text-lg font-bold" style="color: ${group.color};">${group.code}</span>
                                </div>
                                <div class="ml-4">
                                    <h3 class="text-lg font-medium text-gray-900">${group.name}</h3>
                                    <p class="text-sm text-gray-500">${group.description || 'No description'}</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-1">
                                <button onclick="editGroup(${group.id})" class="p-1 text-gray-400 hover:text-gray-600">
                                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                    </svg>
                                </button>
                                <button onclick="confirmDeleteGroup(${group.id}, '${group.name}')" class="p-1 text-gray-400 hover:text-red-600">
                                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        
                        <div class="flex items-center justify-between text-sm text-gray-600 mb-4">
                            <span class="flex items-center">
                                <svg class="h-4 w-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                                </svg>
                                ${group.member_count} members
                            </span>
                            <span class="px-2 py-1 text-xs font-medium rounded-full ${group.is_active ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">
                                ${group.is_active ? 'Active' : 'Inactive'}
                            </span>
                        </div>
                        
                        <button onclick="openMembersModal(${group.id})" class="w-full px-4 py-2 text-sm font-medium text-blue-600 bg-blue-50 rounded-lg hover:bg-blue-100 transition-colors">
                            View Members
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Create/Edit Group Modal
        function openCreateGroupModal() {
            editingGroupId = null;
            document.getElementById('modalTitle').textContent = 'Create New Group';
            document.getElementById('submitButtonText').textContent = 'Create Group';
            document.getElementById('groupForm').reset();
            document.getElementById('groupColor').value = '#3B82F6';
            document.getElementById('groupColorText').value = '#3B82F6';
            document.getElementById('groupModal').classList.remove('hidden');
        }

        function editGroup(groupId) {
            const group = groups.find(g => g.id === groupId);
            if (!group) return;
            
            editingGroupId = groupId;
            document.getElementById('modalTitle').textContent = 'Edit Group';
            document.getElementById('submitButtonText').textContent = 'Update Group';
            document.getElementById('groupCode').value = group.code;
            document.getElementById('groupName').value = group.name;
            document.getElementById('groupDescription').value = group.description || '';
            document.getElementById('groupColor').value = group.color;
            document.getElementById('groupColorText').value = group.color;
            document.getElementById('groupModal').classList.remove('hidden');
        }

        function closeGroupModal() {
            document.getElementById('groupModal').classList.add('hidden');
            editingGroupId = null;
        }

        async function handleGroupSubmit(event) {
            event.preventDefault();
            showLoading();
            
            const formData = {
                code: document.getElementById('groupCode').value,
                name: document.getElementById('groupName').value,
                description: document.getElementById('groupDescription').value,
                color: document.getElementById('groupColor').value
            };
            
            try {
                const token = localStorage.getItem('authToken');
                const url = editingGroupId 
                    ? `${API_BASE_URL}/groups/${editingGroupId}/update`
                    : `${API_BASE_URL}/groups/create`;
                const method = editingGroupId ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                if (data.success) {
                    showNotification('success', editingGroupId ? 'Group updated successfully' : 'Group created successfully');
                    closeGroupModal();
                    await loadGroups();
                    await loadStatistics();
                } else {
                    showNotification('error', data.message || 'Operation failed');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('error', 'An error occurred');
            } finally {
                hideLoading();
            }
        }

        // Delete Group
        async function confirmDeleteGroup(groupId, groupName) {
            if (confirm(`Are you sure you want to delete the group "${groupName}"? This action cannot be undone.`)) {
                await deleteGroup(groupId);
            }
        }

        async function deleteGroup(groupId) {
            showLoading();
            try {
                const token = localStorage.getItem('authToken');
                const response = await fetch(`${API_BASE_URL}/groups/${groupId}/delete?force=true`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                if (data.success) {
                    showNotification('success', 'Group deleted successfully');
                    await loadGroups();
                    await loadStatistics();
                } else {
                    showNotification('error', data.message || 'Delete failed');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('error', 'An error occurred');
            } finally {
                hideLoading();
            }
        }

        // Members Modal
        async function openMembersModal(groupId) {
            currentGroup = groups.find(g => g.id === groupId);
            if (!currentGroup) return;
            
            document.getElementById('membersModalTitle').textContent = `${currentGroup.name} Members`;
            document.getElementById('membersModal').classList.remove('hidden');
            
            await loadGroupMembers(groupId);
        }

        function closeMembersModal() {
            document.getElementById('membersModal').classList.add('hidden');
            hideAddMemberForm();
            hideBulkAddForm();
            currentGroup = null;
            currentGroupMembers = [];
        }

        async function loadGroupMembers(groupId) {
            showLoading();
            try {
                const token = localStorage.getItem('authToken');
                const response = await fetch(`${API_BASE_URL}/groups/${groupId}/members`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                if (data.success) {
                    currentGroupMembers = data.members;
                    renderMembers(currentGroupMembers);
                }
            } catch (error) {
                console.error('Error loading members:', error);
                showNotification('error', 'Failed to load members');
            } finally {
                hideLoading();
            }
        }

        function renderMembers(members) {
            const tbody = document.getElementById('membersTableBody');
            
            if (members.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="px-6 py-4 text-center text-gray-500">No members found</td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = members.map(member => `
                <tr>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${member.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${member.phone_number}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${member.donation_count}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">$${member.total_donated.toFixed(2)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        <button onclick="removeMemberFromGroup('${member.phone_number}')" class="text-red-600 hover:text-red-900">Remove</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterMembers(searchTerm) {
            const filtered = currentGroupMembers.filter(member => 
                member.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                member.phone_number.includes(searchTerm)
            );
            renderMembers(filtered);
        }

        // Add Member
        function showAddMemberForm() {
            document.getElementById('addMemberForm').classList.remove('hidden');
            document.getElementById('bulkAddForm').classList.add('hidden');
        }

        function hideAddMemberForm() {
            document.getElementById('addMemberForm').classList.add('hidden');
            document.getElementById('newMemberPhone').value = '';
            document.getElementById('newMemberName').value = '';
        }

        async function addMemberToGroup() {
            const phone = document.getElementById('newMemberPhone').value;
            const name = document.getElementById('newMemberName').value;
            
            if (!phone) {
                showNotification('error', 'Phone number is required');
                return;
            }
            
            showLoading();
            try {
                const token = localStorage.getItem('authToken');
                const response = await fetch(`${API_BASE_URL}/groups/${currentGroup.id}/add-member`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        phone_number: phone,
                        name: name || 'Unknown'
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    showNotification('success', 'Member added successfully');
                    hideAddMemberForm();
                    await loadGroupMembers(currentGroup.id);
                    await loadGroups();
                    await loadStatistics();
                } else {
                    showNotification('error', data.message || 'Failed to add member');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('error', 'An error occurred');
            } finally {
                hideLoading();
            }
        }

        // Bulk Add
        function showBulkAddForm() {
            document.getElementById('bulkAddForm').classList.remove('hidden');
            document.getElementById('addMemberForm').classList.add('hidden');
        }

        function hideBulkAddForm() {
            document.getElementById('bulkAddForm').classList.add('hidden');
            document.getElementById('bulkMembersData').value = '';
        }

        async function bulkAddMembers() {
            const data = document.getElementById('bulkMembersData').value;
            if (!data.trim()) {
                showNotification('error', 'Please enter member data');
                return;
            }
            
            const members = data.split('\n').map(line => {
                const parts = line.split(',').map(p => p.trim());
                return {
                    phone_number: parts[0],
                    name: parts[1] || 'Unknown'
                };
            }).filter(m => m.phone_number);
            
            if (members.length === 0) {
                showNotification('error', 'No valid members found');
                return;
            }
            
            showLoading();
            try {
                const token = localStorage.getItem('authToken');
                const response = await fetch(`${API_BASE_URL}/groups/${currentGroup.id}/bulk-add-members`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ members })
                });
                
                const result = await response.json();
                if (result.success) {
                    showNotification('success', result.message);
                    hideBulkAddForm();
                    await loadGroupMembers(currentGroup.id);
                    await loadGroups();
                    await loadStatistics();
                } else {
                    showNotification('error', result.message || 'Bulk add failed');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('error', 'An error occurred');
            } finally {
                hideLoading();
            }
        }

        // Remove Member
        async function removeMemberFromGroup(phoneNumber) {
            if (!confirm('Remove this member from the group?')) return;
            
            showLoading();
            try {
                const token = localStorage.getItem('authToken');
                const response = await fetch(`${API_BASE_URL}/groups/${currentGroup.id}/remove-member`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ phone_number: phoneNumber })
                });
                
                const data = await response.json();
                if (data.success) {
                    showNotification('success', 'Member removed successfully');
                    await loadGroupMembers(currentGroup.id);
                    await loadGroups();
                    await loadStatistics();
                } else {
                    showNotification('error', data.message || 'Failed to remove member');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('error', 'An error occurred');
            } finally {
                hideLoading();
            }
        }

        // Sync Groups
        async function syncGroups() {
            if (!confirm('This will sync groups from existing donation data. Continue?')) return;
            
            showLoading();
            try {
                const token = localStorage.getItem('authToken');
                const response = await fetch(`${API_BASE_URL}/groups/sync`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                if (data.success) {
                    showNotification('success', data.message);
                    await loadGroups();
                    await loadStatistics();
                } else {
                    showNotification('error', data.message || 'Sync failed');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('error', 'An error occurred during sync');
            } finally {
                hideLoading();
            }
        }

        // UI Utilities
        function showLoading() {
            document.getElementById('loadingSpinner').classList.remove('hidden');
        }

        function hideLoading() {  
            document.getElementById('loadingSpinner').classList.add('hidden');
        }

        function showNotification(type, message) {
            const container = document.getElementById('notificationContainer');
            const notification = document.createElement('div');
            notification.className = `px-4 py-3 rounded-lg shadow-lg transition-all transform translate-x-0 ${
                type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'
            }`;
            notification.innerHTML = `
                <div class="flex items-center">
                    ${type === 'success' ? 
                        `<svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>` :
                        `<svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>`
                    }
                    <span>${message}</span>
                </div>
            `;
            
            container.appendChild(notification);
            
            setTimeout(() => {
                notification.style.opacity = '0';
                setTimeout(() => {
                    container.removeChild(notification);
                }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
