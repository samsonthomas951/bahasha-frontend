<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church Donation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a2d1a 0%, #2d4a2d 100%);
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 100%;
            height: 100vh;
            max-width: 100%;
            background: white;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .form-container {
            padding: 0 20px 20px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .logo {
            text-align: center;
            margin-bottom: 10px;
            padding-top: 0;
        }

        .logo img {
            max-width: 200px;
            height: auto;
        }

        .church-name {
            font-size: 20px;
            font-weight: 600;
            color: #2d5a2d;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }

        .form {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form.hidden {
            display: none;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-field, .select-field {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            transition: border-color 0.3s;
        }

        .input-field:focus, .select-field:focus {
            outline: none;
            border-color: #4a7c4a;
        }

        .select-field {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 12px center;
            background-repeat: no-repeat;
            background-size: 16px;
            padding-right: 40px;
        }

        .receipt-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }

        .receipt-title {
            font-size: 18px;
            color: #2d5a2d;
            margin-bottom: 15px;
            font-weight: 600;
            text-align: center;
        }

        .receipt-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        .receipt-table th,
        .receipt-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }

        .receipt-table th {
            background-color: #e8f5e8;
            font-weight: 600;
            color: #2d5a2d;
            font-size: 14px;
        }

        .receipt-table td {
            font-size: 14px;
            color: #495057;
        }

        .receipt-table .amount {
            text-align: right;
            font-weight: 500;
        }

        .receipt-total {
            background-color: #2d5a2d;
            color: white;
        }

        .receipt-total td {
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .next-btn, .give-btn {
            background: linear-gradient(135deg, #4a7c4a 0%, #5a8c5a 100%);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: auto;
            margin-bottom: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
            text-align: left;
        }

        .next-btn:hover, .give-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 124, 74, 0.3);
        }

        .next-btn:active, .give-btn:active {
            transform: translateY(0);
        }

        .loading {
            position: relative;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: translateY(-50%) rotate(0deg); }
            100% { transform: translateY(-50%) rotate(360deg); }
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #c3e6cb;
            text-align: center;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #f5c6cb;
            text-align: center;
        }

        .static-field {
            transition: all 0.3s ease;
        }

        .dynamic-category {
            background: #f0f8ff;
            border: 1px solid #ddeeff;
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 10px;
        }

        .remove-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .remove-btn:hover {
            background: #cc0000 !important;
            transform: scale(1.1);
            transition: all 0.2s ease;
        }

        .form-page {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: white;
            transition: transform 0.3s ease-in-out;
        }

        .form-page.hidden {
            transform: translateX(100%);
        }

        /* Loading and Error States */
        .loading-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: white;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #4a7c4a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .error-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: white;
            padding: 20px;
        }

        .error-content {
            text-align: center;
            max-width: 400px;
        }

        .error-icon {
            font-size: 60px;
            color: #ff4444;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .error-text {
            color: #666;
            margin-bottom: 20px;
        }

        @media (min-width: 768px) {
            .container {
                max-width: 500px;
                margin: 0 auto;
                box-shadow: 0 0 20px rgba(0,0,0,0.1);
            }
            
            .form-container {
                padding: 40px;
            }
        }

        @media (min-width: 1024px) {
            body {
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }
            
            .container {
                height: auto;
                min-height: 600px;
                border-radius: 20px;
                overflow: hidden;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div style="text-align: center;">
            <div class="loading-spinner"></div>
            <p style="margin-top: 20px; color: #666;">Loading church details...</p>
        </div>
    </div>

    <!-- Error Screen -->
    <div id="errorScreen" class="error-screen" style="display: none;">
        <div class="error-content">
            <div class="error-icon">⚠️</div>
            <h2 class="error-title">Church Not Found</h2>
            <p class="error-text" id="errorMessage"></p>
        </div>
    </div>

    <div class="container" id="mainContainer" style="display: none;">
        <!-- First Form -->
        <div class="form-container form-page" id="form1">
            <div class="logo">
                <img id="churchLogo" src="" alt="Church Logo">
                <div class="church-name" id="churchName"></div>
                <div class="subtitle" id="churchSubtitle"></div>
            </div>
            
            <form class="form" id="contributionForm">
                <div class="input-group">
                    <input type="text" class="input-field" id="tithe" placeholder="Tithe" inputmode="numeric">
                </div>
                
                <div class="input-group">
                    <input type="text" class="input-field" id="offering" placeholder="Offering" inputmode="numeric">
                </div>
                
                <div class="input-group">
                    <input type="text" class="input-field" id="localBudget" placeholder="Local church budget" inputmode="numeric">
                </div>
                
                <div class="input-group">
                    <input type="text" class="input-field" id="churchDevelopment" placeholder="Church development" inputmode="numeric">
                </div>
                
                <div class="input-group static-field">
                    <input type="text" class="input-field" id="evangelism" placeholder="Evangelism" inputmode="numeric">
                </div>
                
                <div class="input-group" id="added_field"></div>

                <div class="input-group">
                    <select class="select-field" id="category">
                        <option value="">Choose category Options</option>
                        <option value="Children">Children</option>
                        <option value="Youth">Youth</option>
                        <option value="AEMR">AEMR/LCB</option>
                        <option value="Welfare">Welfare</option>
                        <option value="Camp Offering">Camp meeting -offering</option>
                        <option value="Camp Expenses">Camp meeting -expenses</option>
                        <option value="Youth Kitty">Youth Kitty</option>
                        <option value="Choir Kitty">Choir Kitty</option>
                    </select>
                </div>
                
                <button type="submit" class="next-btn" id="nextBtn">Next</button>
            </form>
        </div>
        
        <!-- Second Form -->
        <div class="form-container form-page hidden" id="form2">
            <div class="logo">
                <img id="churchLogo2" src="" alt="Church Logo">
                <div class="church-name" id="churchName2"></div>
                <div class="subtitle" id="churchSubtitle2"></div>
            </div>
            
            <div class="receipt-section">
                <div class="receipt-title">Receipt Summary</div>
                <table class="receipt-table" id="receiptTable">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th class="amount">Amount (Ksh)</th>
                        </tr>
                    </thead>
                    <tbody id="receiptBody"></tbody>
                </table>
            </div>
            
            <form class="form" id="paymentForm">
                <div class="input-group">
                    <input type="text" class="input-field" id="giverName" placeholder="Name" required>
                </div>
                
                <div class="input-group">
                    <select class="select-field" id="memberStatus" required>
                        <option value="member">Church Member</option>
                        <option value="visitor">Visitor</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <input type="tel" class="input-field" id="mpesaNumber" placeholder="M-Pesa number (254XXXXXXXXX)" required pattern="254[0-9]{9}" title="Please enter a valid phone number starting with 254">
                </div>
                
                <button type="submit" class="give-btn" id="giveBtn">Give</button>
                
                <div id="messageContainer"></div>
            </form>
        </div>
    </div>

        offering: 0,
        localBudget: 0,
        churchDevelopment: 0,
        evangelism: 0,
        dynamicCategories: {},
        total: 0
    };
    let categoryCounter = 0;

    // Extract church code from URL
    function getChurchCode() {
        const path = window.location.pathname;
        const parts = path.split('/form/');
        return parts[1] ? parts[1].replace('/', '') : null;
    }

    // Fetch church by code
    async function fetchChurch(churchCode) {
        const response = await fetch(`${API_BASE_URL}/churches/code/${churchCode}`, {
            headers: {
                'ngrok-skip-browser-warning': 'true',
                'Content-Type': 'application/json'
            }
        });
        
        if (!response.ok) {
            const errorData = await response.json().catch(() => ({ error: 'Church not found' }));
            throw new Error(errorData.error || 'Church not found');
        }
        
        const data = await response.json();
        return data.church;
    }

    // Render church details
    function renderChurch(church) {
        currentChurch = church;
        
        // Set logo and name on both forms
        const logo1 = document.getElementById('churchLogo');
        const logo2 = document.getElementById('churchLogo2');
        if (church.logo_url) {
            logo1.src = church.logo_url;
            logo2.src = church.logo_url;
            logo1.style.display = 'block';
            logo2.style.display = 'block';
        } else {
            logo1.style.display = 'none';
            logo2.style.display = 'none';
        }
        
        document.getElementById('churchName').textContent = church.name;
        document.getElementById('churchName2').textContent = church.name;
        
        const subtitle = `${church.name} WhatsApp Envelope`;
        document.getElementById('churchSubtitle').textContent = subtitle;
        document.getElementById('churchSubtitle2').textContent = subtitle;
        
        // Apply primary color to buttons
        if (church.primary_color) {
            document.getElementById('nextBtn').style.background = 
                `linear-gradient(135deg, ${church.primary_color} 0%, ${adjustColor(church.primary_color, 20)} 100%)`;
            document.getElementById('giveBtn').style.background = 
                `linear-gradient(135deg, ${church.primary_color} 0%, ${adjustColor(church.primary_color, 20)} 100%)`;
        }
        
        document.title = `${church.name} - Donation`;
        
        // Show main container
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('mainContainer').style.display = 'block';
    }

    // Adjust color brightness
    function adjustColor(color, percent) {
        const num = parseInt(color.replace("#",""), 16);
        const amt = Math.round(2.55 * percent);
        const R = (num >> 16) + amt;
        const G = (num >> 8 & 0x00FF) + amt;
        const B = (num & 0x0000FF) + amt;
        return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 +
            (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255))
            .toString(16).slice(1);
    }

    // Show error
    function showError(message) {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('errorScreen').style.display = 'flex';
        document.getElementById('errorMessage').textContent = message;
    }

    // Dynamic category management
    document.getElementById('category').addEventListener('change', function() {
        const category = this.value;
        if (category) {
            createCategoryInput(category);
            this.value = ''; // Reset dropdown
        }
    });

    function createCategoryInput(categoryName) {
        categoryCounter++;
        const uniqueId = `${categoryName}_${categoryCounter}`;
        const addedFieldContainer = document.getElementById('added_field');
        
        const inputGroup = document.createElement('div');
        inputGroup.className = 'input-group';
        inputGroup.innerHTML = `
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="text" class="input-field" id="${uniqueId}" 
                       placeholder="${categoryName}" inputmode="numeric" 
                       data-category="${categoryName}">
                <button type="button" class="remove-btn" onclick="removeCategoryField('${uniqueId}')">×</button>
            </div>
        `;
        
        addedFieldContainer.appendChild(inputGroup);
        
        const newInput = document.getElementById(uniqueId);
        newInput.addEventListener('input', function() {
            const value = parseFloat(this.value) || 0;
            contributionData.dynamicCategories[uniqueId] = {
                name: this.dataset.category,
                amount: value
            };
            formatNumberInput(this);
        });
    }

    window.removeCategoryField = function(fieldId) {
        delete contributionData.dynamicCategories[fieldId];
        const field = document.getElementById(fieldId);
        if (field) field.closest('.input-group').remove();
    };

    // Format number inputs
    function formatNumberInput(input) {
        let value = input.value.replace(/[^\d.]/g, '');
        const parts = value.split('.');
        if (parts.length > 2) {
            value = parts[0] + '.' + parts.slice(1).join('');
        }
        input.value = value;
    }

    ['tithe', 'offering', 'localBudget', 'churchDevelopment', 'evangelism'].forEach(id => {
        document.getElementById(id).addEventListener('input', function(e) {
            formatNumberInput(e.target);
        });
    });

    // Form 1 submission
    document.getElementById('contributionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        contributionData.tithe = parseFloat(document.getElementById('tithe').value) || 0;
        contributionData.offering = parseFloat(document.getElementById('offering').value) || 0;
        contributionData.localBudget = parseFloat(document.getElementById('localBudget').value) || 0;
        contributionData.churchDevelopment = parseFloat(document.getElementById('churchDevelopment').value) || 0;
        contributionData.evangelism = parseFloat(document.getElementById('evangelism').value) || 0;
        
        let dynamicTotal = 0;
        Object.values(contributionData.dynamicCategories).forEach(category => {
            dynamicTotal += category.amount;
        });
        
        contributionData.total = contributionData.tithe + contributionData.offering + 
            contributionData.localBudget + contributionData.churchDevelopment + 
            contributionData.evangelism + dynamicTotal;
        
        if (contributionData.total <= 0) {
            alert('Please enter at least one contribution amount');
            return;
        }
        
        updateReceiptTable();
        document.getElementById('form1').classList.add('hidden');
        document.getElementById('form2').classList.remove('hidden');
        history.pushState({page: 'form2'}, "Form 2", "#form2");
    });

    // Update receipt table
    function updateReceiptTable() {
        const receiptBody = document.getElementById('receiptBody');
        const staticContributions = [
            { name: 'Tithe', amount: contributionData.tithe },
            { name: 'Offering', amount: contributionData.offering },
            { name: 'Local Church Budget', amount: contributionData.localBudget },
            { name: 'Church Development', amount: contributionData.churchDevelopment },
            { name: 'Evangelism', amount: contributionData.evangelism }
        ];
        
        let tableHTML = '';
        staticContributions.forEach(contribution => {
            if (contribution.amount > 0) {
                tableHTML += `
                    <tr>
                        <td>${contribution.name}</td>
                        <td class="amount">${contribution.amount.toFixed(2)}</td>
                    </tr>
                `;
            }
        });
        
        Object.values(contributionData.dynamicCategories).forEach(category => {
            if (category.amount > 0) {
                tableHTML += `
                    <tr>
                        <td>${category.name}</td>
                        <td class="amount">${category.amount.toFixed(2)}</td>
                    </tr>
                `;
            }
        });
        
        tableHTML += `
            <tr class="receipt-total">
                <td><strong>Total</strong></td>
                <td class="amount"><strong>${contributionData.total.toFixed(2)}</strong></td>
            </tr>
        `;
        receiptBody.innerHTML = tableHTML;
    }

    // Autofill from localStorage
    document.getElementById('giverName').value = localStorage.getItem('nameStored') || "";
    document.getElementById('mpesaNumber').value = localStorage.getItem('mpesaNumberStored') || "";

    // Form 2 submission
    document.getElementById('paymentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('giverName').value;
        const memberStatus = document.getElementById('memberStatus').value;
        const mpesaNumber = document.getElementById('mpesaNumber').value;
        
        localStorage.setItem('mpesaNumberStored', mpesaNumber);
        localStorage.setItem('nameStored', name);
        
        if (!/^254[0-9]{9}$/.test(mpesaNumber)) {
            showMessage('Please enter a valid phone number starting with 254', 'error');
            return;
        }
        
        const giveBtn = document.getElementById('giveBtn');
        giveBtn.classList.add('loading');
        giveBtn.disabled = true;
        giveBtn.innerHTML = 'Processing...';
        
        initiateSTKPush(mpesaNumber, contributionData.total, name, memberStatus);
    });

    // STK Push
    async function initiateSTKPush(phoneNumber, amount, name, memberStatus) {
        try {
            const response = await fetch(`${API_BASE_URL}/mpesa/stkpush`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true'
                },
                body: JSON.stringify({
                    phoneNumber: phoneNumber,
                    amount: amount,
                    name: name,
                    memberStatus: memberStatus,
                    churchId: currentChurch.id,
                    contributionData: contributionData
                })
            });

            const data = await response.json();
            
            if (data.success) {
                showMessage(`STK push sent to ${phoneNumber}. Please check your phone and enter your M-Pesa PIN to complete the payment of Ksh ${amount.toFixed(2)}`, 'success');
                checkPaymentStatus(data.checkoutRequestId, name, amount);
            } else {
                showMessage(`Payment initiation failed: ${data.message}`, 'error');
                resetGiveButton();
            }
        } catch (error) {
            console.error('Payment error:', error);
            showMessage('Payment initiation failed. Please check your connection.', 'error');
            resetGiveButton();
        }
    }

    // Check payment status
    async function checkPaymentStatus(checkoutRequestId, name, amount) {
        const maxAttempts = 24;
        let attempts = 0;

        const checkStatus = async () => {
            try {
                attempts++;
                const response = await fetch(`${API_BASE_URL}/mpesa/payment-status/${checkoutRequestId}`, {
                    headers: {
                        'ngrok-skip-browser-warning': 'true',
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();

                if (data.success && data.data) {
                    const paymentData = data.data;
                    
                    if (paymentData.status === 'completed') {
                        clearInterval(statusCheckInterval);
                        const receiptInfo = paymentData.mpesaReceiptNumber ? 
                            `Receipt: ${paymentData.mpesaReceiptNumber}` : 
                            'Receipt number will be available shortly';
                        showMessage(`✅ Payment of Ksh ${amount.toFixed(2)} received successfully! Thank you ${name}. ${receiptInfo}`, 'success');
                        resetGiveButton();
                        return;
                    } else if (paymentData.status === 'failed') {
                        clearInterval(statusCheckInterval);
                        showMessage(`❌ Payment failed: ${paymentData.resultDesc || 'Transaction was cancelled'}`, 'error');
                        resetGiveButton();
                        return;
                    }
                }

                if (attempts >= maxAttempts) {
                    clearInterval(statusCheckInterval);
                    showMessage('Payment status check timeout. Please contact support if payment was deducted.', 'error');
                    resetGiveButton();
                }
            } catch (error) {
                console.error('Status check error:', error);
                if (attempts >= maxAttempts) {
                    clearInterval(statusCheckInterval);
                    showMessage('Unable to verify payment status. Please contact support.', 'error');
                    resetGiveButton();
                }
            }
        };

        setTimeout(() => {
            checkStatus();
            statusCheckInterval = setInterval(checkStatus, 5000);
        }, 3000);
    }

    let statusCheckInterval;

    function resetGiveButton() {
        const giveBtn = document.getElementById('giveBtn');
        giveBtn.classList.remove('loading');
        giveBtn.disabled = false;
        giveBtn.innerHTML = 'Give';
    }

    function showMessage(message, type) {
        const messageContainer = document.getElementById('messageContainer');
        const messageClass = type === 'success' ? 'success-message' : 'error-message';
        messageContainer.innerHTML = `<div class="${messageClass}">${message}</div>`;
        
        if (type === 'error') {
            setTimeout(() => {
                if (messageContainer.innerHTML.includes(message)) {
                    messageContainer.innerHTML = '';
                }
            }, 10000);
        }
    }

    // Handle browser back button
    window.addEventListener("popstate", function(event) {
        if (event.state && event.state.page === "form2") {
            document.getElementById('form1').classList.add("hidden");
            document.getElementById('form2').classList.remove("hidden");
        } else {
            document.getElementById('form2').classList.add("hidden");
            document.getElementById('form1').classList.remove("hidden");
        }
    });

    // Initialize
    async function init() {
        const churchCode = getChurchCode();
        
        if (!churchCode) {
            showError('No church code provided in URL');
            return;
        }
        
        try {
            const church = await fetchChurch(churchCode);
            renderChurch(church);
        } catch (error) {
            console.error('Error fetching church:', error);
            showError(`Church not found with code: ${churchCode}`);
        }
    }

    init();
</script>
</body>
</html>
